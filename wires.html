<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#020913"/>
<title>ATLAS — Wires</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#020913}
body{
  font-family:'Rajdhani','Segoe UI',sans-serif;
  background:
    radial-gradient(1200px 700px at 15% -10%, rgba(0,148,255,0.10), transparent 60%),
    radial-gradient(900px 600px at 110% 10%, rgba(0,229,255,0.08), transparent 55%),
    radial-gradient(1000px 800px at 50% 120%, rgba(0,90,200,0.10), transparent 60%),
    linear-gradient(180deg,#03101F 0%,#020913 55%,#010710 100%);
  color:#E7F5FF;
  min-height:100dvh;
  -webkit-tap-highlight-color:transparent;
}
.grid-overlay{
  position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,148,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,148,255,0.035) 1px,transparent 1px);
  background-size:50px 50px;
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 20%,#000 40%,transparent 100%);
  mask-image:radial-gradient(ellipse 80% 60% at 50% 20%,#000 40%,transparent 100%);
  pointer-events:none;z-index:0;
}
@keyframes auroraDrift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-3%,2%) scale(1.06)}}
.aurora-blob{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:auroraDrift 18s ease-in-out infinite}
.aurora-1{width:520px;height:520px;top:-180px;left:-140px;background:radial-gradient(circle,rgba(0,148,255,0.16),transparent 70%)}
.aurora-2{width:460px;height:460px;bottom:-160px;right:-120px;background:radial-gradient(circle,rgba(0,229,255,0.12),transparent 70%);animation-delay:-9s}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.35}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card-enter{animation:fadeUp 0.35s ease-out forwards}

#wrap{position:relative;z-index:2;max-width:720px;margin:0 auto;padding:28px 20px 60px}

#top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.brand-title{
  font-size:22px;font-weight:700;letter-spacing:4px;line-height:1;
  background:linear-gradient(135deg,#7CD8FF,#00BFFF 55%,#0074D9);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 10px rgba(0,148,255,0.25));
}
.brand-sub{font-size:10px;letter-spacing:3px;color:rgba(130,190,230,0.55);margin-top:4px;font-family:monospace}

.back-link{
  display:inline-flex;align-items:center;gap:6px;text-decoration:none;
  border:1px solid rgba(0,148,255,0.22);border-radius:100px;
  padding:7px 16px;font-size:12px;letter-spacing:1.5px;font-family:monospace;
  color:rgba(150,210,255,0.85);background:rgba(0,148,255,0.05);
  transition:all 0.2s cubic-bezier(.2,.8,.3,1);
}
.back-link:hover{background:rgba(0,148,255,0.12);border-color:rgba(0,180,255,0.4);transform:translateY(-1px)}

.summary-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,22,46,0.6);border:1px solid rgba(0,148,255,0.16);
  border-radius:14px;padding:16px 20px;margin-bottom:20px;
  backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);
  box-shadow:0 4px 24px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.03);
}
.summary-label{font-size:11px;letter-spacing:2px;color:rgba(150,190,220,0.55);font-family:monospace}
.summary-count{font-size:28px;font-weight:700;margin-top:4px;color:#00E577}
.summary-count.warn{color:#FFB020}
.refresh-btn{
  border:1px solid rgba(0,148,255,0.3);border-radius:100px;background:rgba(0,148,255,0.08);
  color:#7CC8FF;font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:1.5px;
  padding:8px 18px;cursor:pointer;transition:all 0.2s cubic-bezier(.2,.8,.3,1);
}
.refresh-btn:hover{background:rgba(0,148,255,0.15);transform:translateY(-1px)}
.refresh-btn:active{transform:scale(0.97)}
.refresh-btn.spinning{opacity:0.6;pointer-events:none}

#cards{display:flex;flex-direction:column;gap:12px}
.wire-card{
  position:relative;display:flex;align-items:center;gap:14px;
  background:linear-gradient(155deg,rgba(6,22,46,0.75),rgba(3,14,32,0.7));
  border:1px solid rgba(0,148,255,0.14);border-radius:14px;
  padding:16px 18px;
  backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);
  box-shadow:0 4px 20px rgba(0,0,0,0.22),inset 0 1px 0 rgba(255,255,255,0.03);
  transition:border-color 0.2s,transform 0.2s;
}
.wire-card:hover{border-color:rgba(0,180,255,0.3);transform:translateY(-1px)}
.wire-card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:2px;border-radius:14px 0 0 14px;
}
.wire-card.live::before{background:linear-gradient(180deg,#00E577,rgba(0,229,119,0.1))}
.wire-card.off::before{background:linear-gradient(180deg,rgba(255,96,96,0.7),rgba(255,96,96,0.1))}

.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.status-dot.live{background:#00E577;box-shadow:0 0 10px #00E577;animation:blink 2.4s ease-in-out infinite}
.status-dot.off{background:rgba(255,96,96,0.75);box-shadow:0 0 8px rgba(255,96,96,0.5)}

.wire-info{flex:1;min-width:0}
.wire-label{font-size:15px;font-weight:600;color:#E7F5FF}
.wire-meta{font-size:11px;font-family:monospace;letter-spacing:0.5px;color:rgba(140,180,210,0.5);margin-top:2px}

.wire-badge{
  font-size:9px;font-family:monospace;letter-spacing:1.5px;
  border-radius:100px;padding:5px 12px;flex-shrink:0;
}
.wire-badge.live{color:#00E577;border:1px solid rgba(0,229,119,0.3);background:rgba(0,229,119,0.08)}
.wire-badge.off{color:rgba(255,120,120,0.9);border:1px solid rgba(255,96,96,0.3);background:rgba(255,96,96,0.06)}

#empty-state, #error-state{
  text-align:center;padding:40px 20px;color:rgba(150,190,220,0.5);font-size:13px;
}

#footnote{
  margin-top:24px;font-size:11px;line-height:1.6;color:rgba(120,160,190,0.5);
  font-family:monospace;text-align:center;
}
#footnote code{color:rgba(150,200,240,0.7)}
</style>
</head>
<body>
<div class="grid-overlay"></div>
<div class="aurora-blob aurora-1"></div>
<div class="aurora-blob aurora-2"></div>

<div id="wrap">
  <div id="top">
    <div class="brand">
      <div>
        <div class="brand-title">WIRES</div>
        <div class="brand-sub">CONNECTED SERVICES // ATLAS</div>
      </div>
    </div>
    <a class="back-link" href="/">← BACK TO ATLAS</a>
  </div>

  <div class="summary-bar">
    <div>
      <div class="summary-label">ACTIVE CONNECTIONS</div>
      <div class="summary-count" id="summary-count">—</div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadWires()">↻ REFRESH</button>
  </div>

  <div id="cards"></div>
  <div id="empty-state" style="display:none">No connectors reported by the backend.</div>
  <div id="error-state" style="display:none">Couldn't reach the Atlas backend. Is the server running?</div>

  <div id="footnote">Missing a wire? See <code>CONNECTORS.md</code> in the repo for setup steps.</div>
</div>

<script>
const API_BASE = window.ATLAS_API_BASE || "";

async function loadWires() {
  const btn = document.getElementById("refresh-btn");
  const cards = document.getElementById("cards");
  const empty = document.getElementById("empty-state");
  const error = document.getElementById("error-state");
  btn.classList.add("spinning");
  error.style.display = "none";
  empty.style.display = "none";

  try {
    const res = await fetch(`${API_BASE}/api/status`);
    const data = await res.json();
    const list = data.connectors || [];
    const connected = list.filter((c) => c.connected).length;

    const countEl = document.getElementById("summary-count");
    countEl.textContent = `${connected} / ${list.length}`;
    countEl.className = "summary-count" + (connected < list.length ? " warn" : "");

    if (!list.length) {
      cards.innerHTML = "";
      empty.style.display = "block";
    } else {
      cards.innerHTML = list.map((c, i) => `
        <div class="wire-card ${c.connected ? "live" : "off"} card-enter" style="animation-delay:${i * 0.04}s">
          <span class="status-dot ${c.connected ? "live" : "off"}"></span>
          <div class="wire-info">
            <div class="wire-label">${c.label}</div>
            <div class="wire-meta">${c.connected ? "Operational" : "Not configured"}</div>
          </div>
          <span class="wire-badge ${c.connected ? "live" : "off"}">${c.connected ? "LIVE" : "OFF"}</span>
        </div>
      `).join("");
    }
  } catch (err) {
    document.getElementById("summary-count").textContent = "—";
    cards.innerHTML = "";
    error.style.display = "block";
  } finally {
    btn.classList.remove("spinning");
  }
}

loadWires();
</script>
</body>
</html>
