<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#020C18"/>
<title>ATLAS — Personal AI</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="icon" href="/icon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="/icon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#020C18}

body{
  font-family:'Rajdhani','Segoe UI',sans-serif;
  background:#020C18;
  color:#E0F4FF;
  height:100dvh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

.grid-overlay{
  position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,148,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,148,255,0.035) 1px,transparent 1px);
  background-size:50px 50px;
  pointer-events:none;z-index:0;
}

@keyframes scanline{
  from{transform:translateY(-4px);opacity:0}
  5%{opacity:1}95%{opacity:1}
  to{transform:translateY(100vh);opacity:0}
}
.scan-line{
  position:fixed;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(0,229,255,0.1) 20%,rgba(0,229,255,0.45) 50%,rgba(0,229,255,0.1) 80%,transparent 100%);
  animation:scanline 14s linear infinite;
  pointer-events:none;z-index:1;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-enter{animation:fadeUp 0.28s ease-out forwards}

@keyframes dot-pulse{0%,80%,100%{transform:scale(0.55);opacity:0.4}40%{transform:scale(1.1);opacity:1}}
.d1{animation:dot-pulse 1.4s ease-in-out 0s infinite}
.d2{animation:dot-pulse 1.4s ease-in-out 0.2s infinite}
.d3{animation:dot-pulse 1.4s ease-in-out 0.4s infinite}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.blink{animation:blink 1.6s ease-in-out infinite}

@keyframes micPulse{
  0%{box-shadow:0 0 0 0 rgba(255,60,60,0.6),0 0 22px rgba(255,60,60,0.3)}
  70%{box-shadow:0 0 0 14px rgba(255,60,60,0),0 0 22px rgba(255,60,60,0.15)}
  100%{box-shadow:0 0 0 0 rgba(255,60,60,0)}
}
.mic-pulse{animation:micPulse 1.2s ease-out infinite}

@keyframes speakRing{
  0%{box-shadow:0 0 0 0 rgba(0,229,255,0.7),0 0 20px rgba(0,229,255,0.4)}
  70%{box-shadow:0 0 0 12px rgba(0,229,255,0),0 0 20px rgba(0,229,255,0.2)}
  100%{box-shadow:0 0 0 0 rgba(0,229,255,0)}
}
.speak-ring{animation:speakRing 1s ease-out infinite}

@keyframes humourSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.humour-panel{animation:humourSlide 0.22s ease-out forwards}

#msg-scroll::-webkit-scrollbar{width:3px}
#msg-scroll::-webkit-scrollbar-track{background:transparent}
#msg-scroll::-webkit-scrollbar-thumb{background:rgba(0,148,255,0.22);border-radius:2px}

.input-field{
  background:rgba(0,148,255,0.05);
  border:1px solid rgba(0,148,255,0.22);
  border-radius:6px;color:#E0F4FF;
  font-family:'Rajdhani',sans-serif;
  font-size:16px;font-weight:400;
  padding:12px 16px;width:100%;resize:none;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;line-height:1.5;
}
.input-field:focus{border-color:rgba(0,148,255,0.55);box-shadow:0 0 0 3px rgba(0,148,255,0.07),0 0 22px rgba(0,148,255,0.1)}
.input-field::placeholder{color:rgba(150,190,220,0.32)}

.send-btn{
  background:linear-gradient(135deg,#003D99,#0094FF);
  border:1px solid rgba(0,148,255,0.45);
  border-radius:6px;color:#fff;cursor:pointer;
  font-family:'Rajdhani',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:1.5px;
  padding:0 16px;height:46px;min-width:72px;
  transition:all 0.2s;white-space:nowrap;flex-shrink:0;
}
.send-btn:active:not(:disabled){transform:scale(0.97)}
.send-btn:disabled{opacity:0.38;cursor:not-allowed}

.mic-btn{
  border-radius:50%;border:2px solid rgba(255,80,80,0.55);
  background:rgba(255,40,40,0.1);color:#FF6060;
  cursor:pointer;width:46px;height:46px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;font-size:20px;
  -webkit-user-select:none;user-select:none;
}
.mic-btn.active{border-color:#FF3030;background:rgba(255,40,40,0.22)}

.speak-btn{
  border-radius:50%;border:2px solid rgba(0,200,255,0.45);
  background:rgba(0,200,255,0.07);color:#00C8FF;
  cursor:pointer;width:46px;height:46px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;font-size:18px;
  -webkit-user-select:none;user-select:none;
}
.speak-btn.active{border-color:#00E5FF;background:rgba(0,229,255,0.15);color:#00E5FF}

.quick-btn{
  background:rgba(0,148,255,0.07);border:1px solid rgba(0,148,255,0.22);
  border-radius:100px;color:rgba(0,191,255,0.8);
  cursor:pointer;font-family:'Rajdhani',sans-serif;
  font-size:13px;font-weight:500;padding:6px 14px;
  transition:all 0.18s;white-space:nowrap;
}

.hud-chip{
  border:1px solid rgba(0,148,255,0.18);border-radius:3px;
  padding:3px 7px;font-size:9px;letter-spacing:1px;
  font-family:monospace;color:rgba(0,148,255,0.6);white-space:nowrap;
}

.humour-chip{
  border-radius:3px;padding:3px 7px;font-size:9px;
  letter-spacing:1px;font-family:monospace;
  white-space:nowrap;cursor:pointer;user-select:none;
  transition:all 0.2s;
}

.sys-chip{
  border:1px solid rgba(0,229,120,0.22);border-radius:3px;
  padding:3px 7px;font-size:9px;letter-spacing:1px;
  font-family:monospace;color:#00E577;white-space:nowrap;
}

#humour-panel{
  display:none;position:absolute;top:68px;right:14px;z-index:50;
  background:rgba(3,16,40,0.97);backdrop-filter:blur(20px);
  border:1px solid rgba(0,148,255,0.28);border-radius:10px;
  padding:16px 18px;width:260px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
}
#humour-panel.open{display:block}

.humour-track{
  -webkit-appearance:none;appearance:none;
  width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer;
}
.humour-track::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:#00C8FF;
  border:2px solid #020C18;box-shadow:0 0 8px rgba(0,200,255,0.5);
}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100dvh;position:relative;z-index:2}
#header{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:rgba(2,12,24,0.94);
  border-bottom:1px solid rgba(0,148,255,0.16);backdrop-filter:blur(14px);
  position:relative;z-index:10;
}
#msg-scroll{
  flex:1;overflow-y:auto;padding:16px 14px;
  display:flex;flex-direction:column;gap:14px;z-index:1;
  -webkit-overflow-scrolling:touch;
}
#input-bar{
  flex-shrink:0;z-index:10;background:rgba(2,12,24,0.95);
  border-top:1px solid rgba(0,148,255,0.15);
  backdrop-filter:blur(14px);padding:10px 12px 12px;
}

.atlas-avatar{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(0,148,255,0.65);background:rgba(0,20,50,0.9);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px rgba(0,148,255,0.25);transition:all 0.4s ease;
}
.atlas-avatar.processing{border-color:rgba(0,229,255,0.9);box-shadow:0 0 22px rgba(0,229,255,0.55)}
.atlas-avatar.speaking{border-color:rgba(0,229,255,0.9)}

.msg-bubble-atlas{
  max-width:78%;background:rgba(3,16,38,0.82);
  border:1px solid rgba(0,148,255,0.11);
  border-radius:12px 12px 12px 2px;
  padding:10px 14px;color:#E0F4FF;font-size:15px;line-height:1.65;
}
.msg-bubble-user{
  max-width:78%;
  background:linear-gradient(135deg,rgba(0,70,170,0.32),rgba(0,148,255,0.18));
  border:1px solid rgba(0,148,255,0.38);
  border-radius:12px 12px 2px 12px;
  padding:10px 14px;color:#E0F4FF;font-size:15px;line-height:1.65;
  box-shadow:0 2px 18px rgba(0,100,200,0.12);
}
.replay-btn{
  margin-top:6px;font-size:11px;color:rgba(0,200,255,0.4);
  cursor:pointer;letter-spacing:1px;font-family:monospace;
  user-select:none;-webkit-user-select:none;
}
.msg-row{display:flex;gap:10px;align-items:flex-end}
.msg-row.user{justify-content:flex-end}
.msg-row.atlas{justify-content:flex-start}

.user-avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  border:1.5px solid rgba(0,148,255,0.3);background:rgba(0,28,65,0.75);
  display:flex;align-items:center;justify-content:center;
  color:#7EC8FF;font-size:12px;font-weight:700;
}
.atlas-mini-avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  border:1.5px solid rgba(0,148,255,0.55);background:rgba(0,18,45,0.9);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 10px rgba(0,148,255,0.18);
}

.controls-row{display:flex;gap:7px;align-items:flex-end}
.footer-row{
  margin-top:7px;display:flex;justify-content:space-between;
  font-size:9px;letter-spacing:1.5px;font-family:monospace;
  color:rgba(0,148,255,0.3);
}

#voice-status{
  display:none;margin-bottom:8px;font-size:11px;font-family:monospace;
  letter-spacing:1px;color:#FF6060;align-items:center;gap:6px;
}
#voice-status.show{display:flex}

.thinking-row{display:flex;gap:10px;align-items:flex-end}
.thinking-bubble{
  padding:13px 16px;border-radius:12px 12px 12px 2px;
  background:rgba(3,16,38,0.82);border:1px solid rgba(0,229,255,0.22);
  display:flex;gap:5px;align-items:center;
}
.thinking-dot{width:6px;height:6px;border-radius:50%;background:#00E5FF}
.thinking-avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  border:1.5px solid rgba(0,229,255,0.85);background:rgba(0,18,45,0.9);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 18px rgba(0,229,255,0.45);
}

#quick-cmds{padding-left:40px;display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
</style>
</head>
<body>
<div class="grid-overlay"></div>
<div class="scan-line"></div>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="atlas-avatar" id="main-avatar">
        <svg viewBox="0 0 32 32" width="22" height="22" id="main-icon">
          <circle cx="16" cy="16" r="14" fill="none" stroke="rgba(0,148,255,0.35)" stroke-width="1.2"/>
          <polygon points="16,3 17.5,14 16,17.5 14.5,14" fill="#00BFFF"/>
          <polygon points="16,29 17.5,18 16,14.5 14.5,18" fill="rgba(0,148,255,0.45)"/>
          <polygon points="3,16 14,14.5 17.5,16 14,17.5" fill="rgba(0,148,255,0.45)"/>
          <polygon points="29,16 18,14.5 14.5,16 18,17.5" fill="#00BFFF"/>
          <circle cx="16" cy="16" r="2.5" fill="#0094FF"/>
        </svg>
      </div>
      <div>
        <div style="font-size:18px;font-weight:700;letter-spacing:4px;color:#00BFFF;line-height:1;text-shadow:0 0 18px rgba(0,191,255,0.38)">ATLAS</div>
        <div style="font-size:9px;letter-spacing:2px;margin-top:2px;font-family:monospace;display:flex;align-items:center;gap:4px" id="status-row">
          <span id="status-dot" style="display:inline-block;width:5px;height:5px;border-radius:50%;background:#00E577;box-shadow:0 0 7px #00E577"></span>
          <span id="status-text" style="color:#00E577">ONLINE</span>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
      <div class="hud-chip" id="date-chip"></div>
      <div class="hud-chip" id="time-chip"></div>
      <div class="humour-chip" id="convo-chip" onclick="toggleConversationMode()">🎧 CONVO</div>
      <div class="humour-chip" id="wires-chip" onclick="toggleWires()">🔌 WIRES</div>
      <div class="humour-chip" id="humour-chip" onclick="toggleHumour()"></div>
      <div class="sys-chip">SYS OK</div>
    </div>
  </div>

  <!-- WIRES PANEL -->
  <div id="wires-panel" class="humour-panel" style="right:auto;left:14px">
    <div style="font-size:11px;letter-spacing:2px;color:#0094FF;font-family:monospace;margin-bottom:12px">CONNECTED WIRES</div>
    <div id="wires-list" style="display:flex;flex-direction:column;gap:9px"></div>
    <div style="margin-top:12px;font-size:11px;color:rgba(100,150,180,0.6);line-height:1.5;font-family:monospace">
      Missing a wire? See CONNECTORS.md for setup steps.
    </div>
    <button onclick="toggleWires()" style="margin-top:12px;width:100%;background:rgba(0,148,255,0.1);border:1px solid rgba(0,148,255,0.25);border-radius:5px;color:#7CC8FF;font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:1.5px;padding:6px 0;cursor:pointer">CLOSE</button>
  </div>

  <!-- HUMOUR PANEL -->
  <div id="humour-panel" class="humour-panel">
    <div style="font-size:11px;letter-spacing:2px;color:#0094FF;font-family:monospace;margin-bottom:12px">HUMOUR CALIBRATION</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:13px;color:rgba(150,190,220,0.7)">Level</span>
      <span style="font-size:16px;font-weight:700" id="humour-label-display"></span>
    </div>
    <input type="range" min="1" max="10" value="9" class="humour-track" id="humour-slider" oninput="onHumourSlide(this.value)" style="background:linear-gradient(90deg,#0094FF 88%,rgba(0,148,255,0.18) 88%)"/>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:rgba(100,150,200,0.45);font-family:monospace;margin-top:4px">
      <span>FORMAL</span><span>BALANCED</span><span>ROAST</span>
    </div>
    <div style="margin-top:12px;font-size:11px;color:rgba(100,150,180,0.6);line-height:1.5;font-family:monospace">
      Or say: "set humour to 7" / "be funnier" / "go professional"
    </div>
    <button onclick="toggleHumour()" style="margin-top:12px;width:100%;background:rgba(0,148,255,0.1);border:1px solid rgba(0,148,255,0.25);border-radius:5px;color:#7CC8FF;font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:1.5px;padding:6px 0;cursor:pointer">CLOSE</button>
  </div>

  <!-- MESSAGES -->
  <div id="msg-scroll" onclick="closeAllPanels()">
    <!-- messages injected here -->
    <div id="quick-cmds"></div>
    <div id="thinking" style="display:none" class="thinking-row msg-enter">
      <div class="thinking-avatar">
        <svg viewBox="0 0 32 32" width="16" height="16">
          <circle cx="16" cy="16" r="14" fill="none" stroke="rgba(0,229,255,0.5)" stroke-width="1.2"/>
          <polygon points="16,3 17.5,14 16,17.5 14.5,14" fill="#00E5FF"/>
          <polygon points="16,29 17.5,18 16,14.5 14.5,18" fill="rgba(0,229,255,0.5)"/>
          <polygon points="3,16 14,14.5 17.5,16 14,17.5" fill="rgba(0,229,255,0.5)"/>
          <polygon points="29,16 18,14.5 14.5,16 18,17.5" fill="#00E5FF"/>
          <circle cx="16" cy="16" r="2.5" fill="#00E5FF"/>
        </svg>
      </div>
      <div class="thinking-bubble">
        <div class="thinking-dot d1"></div>
        <div class="thinking-dot d2"></div>
        <div class="thinking-dot d3"></div>
      </div>
    </div>
    <div id="scroll-anchor"></div>
  </div>

  <!-- INPUT BAR -->
  <div id="input-bar">
    <div id="voice-status">
      <span class="blink">●</span>
      <span id="voice-status-text">LISTENING — speak now</span>
    </div>
    <div id="image-preview" style="display:none;align-items:center;gap:8px;padding-bottom:8px">
      <img id="image-preview-thumb" style="width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid rgba(0,148,255,0.3)"/>
      <span style="font-size:11px;color:rgba(0,229,255,0.7);font-family:monospace">IMAGE ATTACHED</span>
      <span style="cursor:pointer;color:#FF6060;font-size:14px;padding:0 4px" onclick="clearPendingImage()">✕</span>
    </div>
    <div class="controls-row">
      <input type="file" id="dataset-file" accept=".csv,.xlsx,.xls" style="display:none" onchange="onDatasetFileChosen(event)"/>
      <button class="speak-btn" id="upload-btn" onclick="document.getElementById('dataset-file').click()" title="Upload a dataset (CSV/Excel)">📊</button>
      <input type="file" id="image-file" accept="image/*" style="display:none" onchange="onImageFileChosen(event)"/>
      <button class="speak-btn" id="image-btn" onclick="document.getElementById('image-file').click()" title="Attach an image">📷</button>
      <button class="mic-btn" id="mic-btn" ontouchstart="onMicDown(event)" ontouchend="onMicUp(event)" onclick="toggleMic()">🎙️</button>
      <textarea class="input-field" id="input-field" placeholder="Command Atlas… or speak 🎙️" rows="1" style="min-height:46px;max-height:130px" oninput="growTextarea(this)" onkeydown="onKeyDown(event)"></textarea>
      <button class="speak-btn" id="speak-btn" onclick="toggleSpeak()">🔊</button>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>SEND</button>
    </div>
    <div class="footer-row">
      <span>ATLAS PERSONAL AI // PRATHMESH</span>
      <span id="speak-footer" style="color:rgba(0,229,255,0.35)">🔊 AUTO-SPEAK</span>
    </div>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────
const API_BASE = window.ATLAS_API_BASE || ""; // same-origin when served by server/server.js
let humourLevel = 9;
let autoSpeak = true;
let isSpeaking = false;
let isListening = false;
let loading = false;
let messages = [];
let recognition = null;
let micHeld = false;
let currentAudio = null;
let pendingImage = null; // { mimeType, data } — base64 data, no data: prefix

// ─── PERSISTENT HISTORY ───────────────────────────────────────────────────
const HISTORY_KEY = "atlas_chat_history";

function saveHistory() {
  // Images are dropped before persisting — base64 photos would blow past
  // localStorage's quota fast, and re-sending old images as context on
  // every future turn isn't useful anyway.
  try {
    const trimmed = messages.map(({ image, ...rest }) => rest);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(trimmed));
  } catch (e) { /* storage unavailable — history just won't persist */ }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) && parsed.length ? parsed : null;
  } catch (e) { return null; }
}

function clearHistory() {
  try { localStorage.removeItem(HISTORY_KEY); } catch (e) {}
  messages = [];
  document.querySelectorAll("#msg-scroll .msg-row").forEach((el) => el.remove());
}

const HUMOUR_LABELS = ["","Robot","Stoic","Formal","Reserved","Balanced","Witty","Clever","Banter","Sharp","Roast Mode"];
const QUICK_CMDS = [
  "Help me ace my data analyst interview",
  "Review my Python skills roadmap",
  "Give me a strong self-introduction",
  "Suggest a portfolio project for me"
];

// ─── SVG ICON ─────────────────────────────────────────────────────────────
function atlasIconSVG(size=16, glow=false) {
  const c = glow ? "rgba(0,229,255,0.5)" : "rgba(0,148,255,0.35)";
  const b = glow ? "#00E5FF" : "#00BFFF";
  const d = glow ? "rgba(0,229,255,0.5)" : "rgba(0,148,255,0.45)";
  const e = glow ? "#00E5FF" : "#0094FF";
  return `<svg viewBox="0 0 32 32" width="${size}" height="${size}">
    <circle cx="16" cy="16" r="14" fill="none" stroke="${c}" stroke-width="1.2"/>
    <polygon points="16,3 17.5,14 16,17.5 14.5,14" fill="${b}"/>
    <polygon points="16,29 17.5,18 16,14.5 14.5,18" fill="${d}"/>
    <polygon points="3,16 14,14.5 17.5,16 14,17.5" fill="${d}"/>
    <polygon points="29,16 18,14.5 14.5,16 18,17.5" fill="${b}"/>
    <circle cx="16" cy="16" r="2.5" fill="${e}"/>
  </svg>`;
}

// ─── RENDER MARKDOWN ──────────────────────────────────────────────────────
function renderContent(text) {
  return text.split("\n").map(line => {
    if (line === "") return '<div style="height:5px"></div>';
    line = line.replace(/\*\*([^*]+)\*\*/g, '<strong style="color:#7CC8FF;font-weight:600">$1</strong>');
    if (/^[\-\*•] /.test(line)) {
      const t = line.replace(/^[\-\*•] /, "");
      return `<div style="display:flex;gap:8px;padding-left:2px;margin-top:2px"><span style="color:#0094FF;flex-shrink:0;margin-top:3px">◆</span><span>${t}</span></div>`;
    }
    const m = line.match(/^(\d+)\. (.+)/);
    if (m) return `<div style="display:flex;gap:8px;padding-left:2px;margin-top:2px"><span style="color:#0094FF;flex-shrink:0;min-width:16px">${m[1]}.</span><span>${m[2]}</span></div>`;
    return `<div>${line}</div>`;
  }).join("");
}

// Images (e.g. from a chart tool) arrive out-of-band from the model's own

function addStreamingImage(id, dataUri, alt) {
  const div = document.getElementById(`msg-${id}`);
  if (!div) return;
  const media = div.querySelector(".stream-media");
  const img = document.createElement("img");

  scrollToBottom();

function finalizeStreamingMessage(id, content) {
  const div = document.getElementById(`msg-${id}`);
  if (!div) return;
  div.querySelector(".stream-text").innerHTML = renderContent(content);
  const replay = document.createElement("div");
  replay.className = "replay-btn";

  div.querySelector(".msg-bubble-atlas").appendChild(replay);

// ─── TTS ──────────────────────────────────────────────────────────────────
let voices = [];
window.speechSynthesis.onvoiceschanged = () => { voices = window.speechSynthesis.getVoices(); };
setTimeout(() => { voices = window.speechSynthesis.getVoices(); }, 500);

async function speak(text) {
  const clean = (text||"").replace(/\*\*/g,"").replace(/^[\-\*•◆] /gm,"").replace(/^\d+\. /gm,"").trim();
  if (!clean) return;
  stopSpeaking();

  try {
    const res = await fetch(`${API_BASE}/api/speak`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: clean })
    });
    if (!res.ok) {
      const errBody = await res.text().catch(() => "");
      throw new Error(`ElevenLabs backend returned ${res.status}: ${errBody}`);
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;

    audio.onplay = () => { isSpeaking = true; setStatus("speaking"); document.getElementById("speak-btn").classList.add("active"); document.getElementById("speak-btn").textContent = "⏹"; };
    audio.onended = () => { isSpeaking = false; setStatus("online"); document.getElementById("speak-btn").classList.remove("active"); document.getElementById("speak-btn").textContent = "🔊"; URL.revokeObjectURL(url); currentAudio = null; continueConversationIfActive(); };
    audio.onerror = () => { isSpeaking = false; setStatus("online"); URL.revokeObjectURL(url); currentAudio = null; };

    await audio.play();
  } catch (err) {
    console.error("[Atlas] ElevenLabs voice failed, falling back to browser voice:", err);
    speakBrowser(clean);
  }
}

function speakBrowser(clean) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(clean);

  const preferred = voices.find(v =>
    v.name.includes("Google UK English Male") ||
    v.name.includes("Daniel") ||
    v.name.includes("David") ||
    (v.lang==="en-GB" && v.name.toLowerCase().includes("male"))
  ) || voices.find(v => v.lang.startsWith("en")) || voices[0];

  if (preferred) utter.voice = preferred;
  utter.pitch = 0.88;
  utter.rate = 0.93;
  utter.volume = 1.0;

  utter.onstart = () => { isSpeaking = true; setStatus("speaking"); document.getElementById("speak-btn").classList.add("active"); document.getElementById("speak-btn").textContent = "⏹"; };
  utter.onend = () => { isSpeaking = false; setStatus("online"); document.getElementById("speak-btn").classList.remove("active"); document.getElementById("speak-btn").textContent = "🔊"; continueConversationIfActive(); };
  utter.onerror = () => { isSpeaking = false; setStatus("online"); };

  window.speechSynthesis.speak(utter);
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  isSpeaking = false;
  setStatus("online");
  document.getElementById("speak-btn").classList.remove("active");
  document.getElementById("speak-btn").textContent = autoSpeak ? "🔊" : "🔇";
}

function toggleSpeak() {
  if (isSpeaking) { stopSpeaking(); return; }
  autoSpeak = !autoSpeak;
  document.getElementById("speak-btn").textContent = autoSpeak ? "🔊" : "🔇";

// ─── STT ──────────────────────────────────────────────────────────────────
function showVoiceStatus(text, color="#FF6060") {
  const el = document.getElementById("voice-status");
  const txt = document.getElementById("voice-status-text");
  el.classList.add("show");
  el.style.color = color;
  txt.textContent = text;
}
function hideVoiceStatus() { document.getElementById("voice-status").classList.remove("show"); }

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showVoiceStatus("Voice not supported in this browser", "#FFB020"); setTimeout(hideVoiceStatus, 2000); return; }
  stopSpeaking();

  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    setStatus("listening");
    showVoiceStatus("LISTENING — speak now", "#FF6060");
    document.getElementById("mic-btn").classList.add("active","mic-pulse");
    document.getElementById("mic-btn").textContent = "🔴";
    document.getElementById("input-field").placeholder = "Listening…";
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r=>r[0].transcript).join("");
    document.getElementById("input-field").value = transcript;
    growTextarea(document.getElementById("input-field"));
    updateSendBtn();
    const isFinal = e.results[e.results.length-1].isFinal;
    showVoiceStatus(isFinal ? "Got it." : "Listening…", isFinal ? "#00C8FF" : "#FF6060");
  };

  recognition.onerror = (e) => {
    isListening = false;
    setStatus("online");
    hideVoiceStatus();
    resetMicBtn();
    showVoiceStatus(`Error: ${e.error}`, "#FFB020");
    setTimeout(hideVoiceStatus, 2000);
  };

  recognition.onend = () => {
    isListening = false;
    setStatus("online");
    hideVoiceStatus();
    resetMicBtn();

    if (conversationMode) {
      const field = document.getElementById("input-field");
      const val = field.value.trim();
      if (/^(stop|exit|end)\s+(the\s+)?conversation$|^stop\s+listening$/i.test(val)) {
        field.value = ""; growTextarea(field); updateSendBtn();
        setConversationMode(false);
        const msg = "Conversation mode off, Prathmesh.";
        addMessage("atlas", msg, Date.now());
        messages.push({ role: "assistant", content: msg });
        if (autoSpeak) speak(msg);
      } else if (val) {
        sendMessage();
      } else {
        setTimeout(() => { if (conversationMode && !isListening && !loading && !isSpeaking) startListening(); }, 800);
      }
    }
  };

  recognition.start();
}

// ─── VOICE COMMAND DETECTION ──────────────────────────────────────────────
function checkHumourCommand(text) {
  const numMatch = text.match(/(?:set|change|make|adjust|put).*?humou?r.*?(?:to|level|at)?\s*(\d+)/i)
    || text.match(/humou?r.*?(?:to|level|at)?\s*(\d+)/i)
    || text.match(/(?:level)\s+(\d+)/i);
  if (numMatch) return Math.min(10, Math.max(1, parseInt(numMatch[1])));

  if (/\broast\b/i.test(text)) return 10;
  if (/\bfunnier\b|\bmore funny\b|\bmore humour\b/i.test(text)) return Math.min(10, humourLevel + 2);
  if (/\bserious\b|\bprofessional\b|\bformal\b|\bno jokes\b/i.test(text)) return 2;
  return null;
}

// ─── SEND ─────────────────────────────────────────────────────────────────
async function sendMessage(overrideText) {
  const field = document.getElementById("input-field");
  const content = (overrideText || field.value).trim();
  if ((!content && !pendingImage) || loading) return;

  // Check for a "clear history" command locally first
  if (/^(clear|reset)\s+(the\s+)?(chat|history|conversation)$/i.test(content)) {
    field.value = ""; growTextarea(field); updateSendBtn();
    clearPendingImage();
    clearHistory();
    const msg = "Chat history cleared, Prathmesh. Starting fresh.";
    messages.push({ role: "assistant", content: msg });
    saveHistory();
    addMessage("atlas", msg, Date.now());
    document.getElementById("quick-cmds").style.display = "flex";
    if (autoSpeak) speak(msg);
    return;
  }

  // Check humour command locally first
  const humourCmd = checkHumourCommand(content);
  if (humourCmd !== null) {
    addMessage("user", content, Date.now());
    messages.push({ role: "user", content });
    saveHistory();
    field.value = ""; growTextarea(field); updateSendBtn();
    clearPendingImage();
    applyHumourSet(humourCmd);
    return;
  }

  // Add user message (with an attached image, if any)
  const image = pendingImage;
  clearPendingImage();
  const displayContent = content || "What do you see in this image?";
  addMessage("user", displayContent, Date.now(), image);
  messages.push(image ? { role: "user", content: displayContent, image } : { role: "user", content: displayContent });
  saveHistory();
  field.value = ""; growTextarea(field); updateSendBtn();

  // Show thinking
  loading = true;
  document.getElementById("thinking").style.display = "flex";
  document.getElementById("send-btn").disabled = true;
  setStatus("processing");
  scrollToBottom();

  let streamId = null;

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        humourLevel,
        messages: messages.map(({ role, content: c, image }) => image ? { role, content: c, image } : { role, content: c })
      })
    });

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || "request failed");
    }

    let bubbleText = null;
    let fullReply = "";
    let suppressed = true;
    let streamError = null;

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buffer.indexOf("\n")) !== -1) {
        const line = buffer.slice(0, idx).trim();
        buffer = buffer.slice(idx + 1);
        if (!line) continue;
        let evt;
        try { evt = JSON.parse(line); } catch (e) { continue; }

        if (evt.type === "text") {
          if (!bubbleText) {
            document.getElementById("thinking").style.display = "none";
            streamId = Date.now();
            bubbleText = addStreamingMessage(streamId);
          }
          fullReply += evt.delta;
          if (suppressed) suppressed = looksLikeHumourSetInProgress(fullReply);
          if (!suppressed) { bubbleText.textContent = fullReply; scrollToBottom(); }
        } else if (evt.type === "image") {
          if (!bubbleText) {
            document.getElementById("thinking").style.display = "none";
            streamId = Date.now();
            bubbleText = addStreamingMessage(streamId);
          }
          addStreamingImage(streamId, evt.dataUri, evt.alt);
        } else if (evt.type === "done") {
          fullReply = evt.reply;
        } else if (evt.type === "error") {
          streamError = evt.error;
        }
      }
    }

    if (streamError) throw new Error(streamError);

    // Handle HUMOUR_SET from AI — never shown raw, since it stayed suppressed the whole stream
    const setMatch = fullReply.match(/^HUMOUR_SET:(\d+)$/);
    if (setMatch) {
      if (streamId) document.getElementById(`msg-${streamId}`)?.remove();
      const newLevel = Math.min(10, Math.max(1, parseInt(setMatch[1])));
      humourLevel = newLevel;
      updateHumourUI();
      fullReply = `Understood, Prathmesh. Humour calibrated to ${newLevel}/10 — ${HUMOUR_LABELS[newLevel]} mode. ${newLevel>=8?"Brace yourself.":newLevel<=3?"All business from here.":"Finding the sweet spot."}`;
      addMessage("atlas", fullReply, Date.now());
    } else if (bubbleText) {
      finalizeStreamingMessage(streamId, fullReply);
    } else {
      document.getElementById("thinking").style.display = "none";
      addMessage("atlas", fullReply, Date.now());
    }

    messages.push({ role: "assistant", content: fullReply });
    saveHistory();
    loading = false;
    setStatus("online");
    if (autoSpeak) speak(fullReply);

  } catch(err) {
    if (streamId) document.getElementById(`msg-${streamId}`)?.remove();
    const reason = err && err.message ? err.message : "unknown error";
    const errMsg = `I've encountered a disruption, Prathmesh: ${reason}`;
    messages.push({ role: "assistant", content: errMsg });
    saveHistory();
    document.getElementById("thinking").style.display = "none";
    loading = false;
    setStatus("online");
    addMessage("atlas", errMsg, Date.now());
    if (autoSpeak) speak(errMsg);
  }

  updateSendBtn();
}

// ─── IMAGE ATTACH (vision) ──────────────────────────────────────────────────
function onImageFileChosen(event) {
  const file = event.target.files[0];
  event.target.value = "";
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    const dataUrl = reader.result;
    const match = dataUrl.match(/^data:(.*?);base64,(.*)$/s);
    if (!match) return;
    pendingImage = { mimeType: match[1] || file.type, data: match[2] };
    document.getElementById("image-preview-thumb").src = dataUrl;
    document.getElementById("image-preview").style.display = "flex";
    updateSendBtn();
  };
  reader.readAsDataURL(file);
}

function clearPendingImage() {
  pendingImage = null;
  document.getElementById("image-preview").style.display = "none";
}

// ─── DATASET UPLOAD (Prism) ────────────────────────────────────────────────
async function onDatasetFileChosen(event) {
  const file = event.target.files[0];
  event.target.value = ""; // allow re-choosing the same file later
  if (!file) return;

  addMessage("user", `📊 Uploading ${file.name}...`, Date.now());
  loading = true;
  document.getElementById("thinking").style.display = "flex";
  setStatus("processing");
  scrollToBottom();

  try {
    const form = new FormData();
    form.append("file", file);
    const res = await fetch(`${API_BASE}/api/prism/upload`, { method: "POST", body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Upload failed");

    document.getElementById("thinking").style.display = "none";
    loading = false;
    setStatus("online");

    const warn = data.warnings && data.warnings.length ? `\n\n⚠ ${data.warnings.join(" ")}` : "";
    const msg = `Loaded **${data.name}** — ${data.rows} rows, ${data.columns.length} columns:\n${data.columns.map(c => `- ${c}`).join("\n")}${warn}\n\nAsk me anything about it — I can query it, profile it, or chart any column.`;
    messages.push({ role: "user", content: `[Uploaded dataset: ${data.name}]` });
    messages.push({ role: "assistant", content: msg });
    saveHistory();
    addMessage("atlas", msg, Date.now());
    if (autoSpeak) speak(`Loaded ${data.name}, Prathmesh — ${data.rows} rows, ${data.columns.length} columns. What would you like to know?`);
  } catch (err) {
    document.getElementById("thinking").style.display = "none";
    loading = false;
    setStatus("online");
    const errMsg = `I couldn't load that file, Prathmesh: ${err.message || "unknown error"}`;
    messages.push({ role: "assistant", content: errMsg });
    saveHistory();
    addMessage("atlas", errMsg, Date.now());
    if (autoSpeak) speak(errMsg);
  }
  updateSendBtn();
}

// ─── QUICK COMMANDS ───────────────────────────────────────────────────────
function renderQuickCmds() {
  const container = document.getElementById("quick-cmds");
  container.innerHTML = QUICK_CMDS.map(q =>
    `<button class="quick-btn" onclick="sendMessage(${JSON.stringify(q)})">${q}</button>`
  ).join("");
}

// ─── DEVICE LOCATION ──────────────────────────────────────────────────────
function reportLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      fetch(`${API_BASE}/api/device/location`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy })
      }).catch(() => {});
    },
    () => { /* permission denied or unavailable — Atlas just won't have location context */ },
    { enableHighAccuracy: false, timeout: 8000, maximumAge: 300000 }
  );
}

// ─── INIT ─────────────────────────────────────────────────────────────────
function init() {
  updateHumourUI();
  renderQuickCmds();
  reportLocation();
  setInterval(reportLocation, 15 * 60 * 1000);
  loadWires();

  const saved = loadHistory();
  if (saved) {
    messages = saved;
    messages.forEach((m, i) => addMessage(m.role === "assistant" ? "atlas" : "user", m.content, i));
    document.getElementById("quick-cmds").style.display = "none";
    return;
  }

  const welcome = "Good to see you online, Prathmesh. All systems are operational.\n\nI'm ATLAS — your personal AI. I can assist with code, data analytics, interview prep, career strategy, or anything else you need. What are we working on today?\n\nTip: Tap 🎙️ to speak to me, 🔊 to hear my response.\n\nSay \"clear chat\" anytime to start fresh.";
  messages.push({ role: "assistant", content: welcome });
  saveHistory();
  addMessage("atlas", welcome, 0);
  document.getElementById("quick-cmds").style.display = "flex";
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}

init();
</script>
